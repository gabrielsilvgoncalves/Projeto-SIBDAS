<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedStock</title>
    <!-- Bootstrap CSS & custom CSS -->
    <link rel="stylesheet" href="../frontend/assets/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../frontend/assets/css/estilos.css">
    <!-- favicon -->
    <link rel="shortcut icon" href="../frontend/assets/img/Logo.png" type="image/png">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="../../SIBDAS_projeto_final/backend/assets/fontawesome/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Bootstrap JS and custom JS -->
    <script src="assets/bootstrap/bootstrap.bundle.min.js"></script>
    <div class="container-fluid mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-6 col-sm-8 col-10">
                <!-- Borda à volta do formulário -->
                <div class="card p-4">
                    <div>
                        <!-- Imagem do Medstock + texto -->
                        <div class="d-flex align-items-center justify-content-center mb-4 gap-3">
                            <img src="../frontend/assets/img/Logo.png" alt="Logo MedStock" height="55">
                            <h2 class="mb-0 logo-titulo">MedStock</h2>
                        </div>                                        
                        
                        <p class="text-center text-muted small mb-4">Introduza as suas credenciais para aceder ao sistema</p>

                        <div class="row">
                            <div class="col">
                            </div>
                        </div>
                    </div>
                    <!-- Formulário -->
                <form action="../backend/index.html" method="get" id="formLogin" novalidate>
                    <div class="mb-3">
                        <label for="utilizador" class="form-label fw-semibold">
                            <i class="fa-regular fa-user me-1"></i> Utilizador
                        </label>
                        <input type="text" class="form-control" id="utilizador" name="utilizador"
                            placeholder="utilizador@hospital.pt" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">
                            <i class="fa-solid fa-lock me-1"></i> Password
                        </label>
                        <input type="password" class="form-control" id="password" name="password"
                            placeholder="********" required>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-login">
                            Entrar <i class="fa-solid fa-right-to-bracket ms-2"></i>
                        </button>
                    </div>

                    <!-- Mensagem de erro (oculta por padrão) -->
                    <div class="alert alert-danger p-2 text-center small d-none" id="erroLogin">
                        <i class="fa-solid fa-triangle-exclamation me-1"></i> Credenciais inválidas. Tente novamente.
                    </div>
                </form>
                </div>
            </div>
        </div>

</body>

</html>
