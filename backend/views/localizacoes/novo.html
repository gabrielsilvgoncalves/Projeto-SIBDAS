<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedStock — Remover Localização</title>
    <link rel="shortcut icon" href="../../assets/img/Logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../../assets/fontawesome/all.min.css">
    <link rel="stylesheet" href="../../assets/css/admin.css">
</head>
<body>
    <header class="container-fluid text-white" style="background-color: #004f63;">
        <div class="row align-items-center">
            <div class="col-6 d-flex align-items-center p-3">
                <a href="../../index.html"><img src="../../assets/img/Logo.png" alt="Logo" height="50" class="me-3"></a>
                <h3 class="mb-0 fw-bold">MedStock</h3>
            </div>
            <div class="col-6 text-end p-3">
                <div class="dropdown">
                    <button class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="fa-regular fa-user me-2"></i> Utilizador
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#"><i class="fa-solid fa-key me-2"></i>Alterar password</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="../../../login/login.html"><i class="fa-solid fa-right-from-bracket me-2"></i>Sair</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </header>
    <div class="container-fluid">
        <div class="row">
            <aside class="col-md-3 col-lg-2 min-vh-100 p-3 text-white" style="background-color: #212529;">
                <h5 class="fw-bold mt-2 mb-3" style="color: #00b8d9;">Menu</h5>
                <nav>
                    <a href="../../index.html" class="nav-link text-white px-2 mb-1 d-block rounded"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
                    <a href="../equipamentos/lista.html" class="nav-link text-white px-2 mb-1 d-block rounded"><i class="fas fa-stethoscope me-2"></i> Equipamentos</a>
                    <a href="../fornecedores/lista.html" class="nav-link text-white px-2 mb-1 d-block rounded"><i class="fas fa-truck me-2"></i> Fornecedores</a>
                    <a href="lista.html" class="nav-link text-white px-2 mb-1 d-block rounded nav-link-active"><i class="fas fa-map-marker-alt me-2"></i> Localizações</a>
                    <a href="../documentos/lista.html" class="nav-link text-white px-2 mb-1 d-block rounded"><i class="fas fa-file-medical me-2"></i> Documentos</a>
                    <a href="../garantias/lista.html" class="nav-link text-white px-2 mb-1 d-block rounded"><i class="fas fa-shield-alt me-2"></i> Garantias</a>
                </nav>
            </aside>
            <main class="col-md-9 col-lg-10 p-4" style="background-color: #f2f2f2;">
                <div class="d-flex justify-content-center">
                    <div class="card w-100 border-0 shadow-sm" style="max-width: 700px;">
                        <div class="card-body">
                            <h2 class="mb-4 fw-bold" style="color: #004f63;"><i class="fas fa-plus me-2"></i> Nova Localização</h2>
                            <hr>
                            <form action="#" method="post" novalidate id="formLocalizacao">
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label for="edificio" class="form-label fw-semibold">Edifício</label>
                                        <input type="text" class="form-control" id="edificio" name="edificio" placeholder="ex: Edifício Principal">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="piso" class="form-label fw-semibold">Piso</label>
                                        <input type="text" class="form-control" id="piso" name="piso" placeholder="ex: Piso 2">
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label for="servico" class="form-label fw-semibold">Serviço / Departamento <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" id="servico" name="servico" placeholder="ex: Urgência Geral" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="sala" class="form-label fw-semibold">Sala / Gabinete</label>
                                        <input type="text" class="form-control" id="sala" name="sala" placeholder="ex: Sala 203">
                                    </div>
                                </div>
                                <div class="d-flex justify-content-end gap-2 mt-4">
                                    <a href="lista.html" class="btn btn-outline-secondary"><i class="fas fa-xmark me-1"></i> Cancelar</a>
                                    <button type="submit" class="btn text-white fw-semibold" style="background-color: #00b8d9;">
                                        <i class="fa-regular fa-floppy-disk me-1"></i> Guardar
                                    </button>
                                </div>
                                <div class="alert alert-danger mt-3 d-none" id="erroForm">
                                    <i class="fas fa-triangle-exclamation me-2"></i> O campo Serviço é obrigatório.
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="../../assets/bootstrap/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('formLocalizacao').addEventListener('submit', function (e) {
            e.preventDefault();
            const servico = document.getElementById('servico');
            if (!servico.value.trim()) {
                servico.classList.add('is-invalid');
                document.getElementById('erroForm').classList.remove('d-none');
            } else {
                alert('Localização guardada com sucesso!');
                window.location.href = 'lista.html';
            }
        });
    </script>
</body>
</html>
