<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedStock — Editar Garantia</title>
    <link rel="shortcut icon" href="../../assets/img/Logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../../assets/fontawesome/all.min.css">
    <link rel="stylesheet" href="../../assets/css/1231236.css">
</head>
<body>
    <header class="container-fluid text-white" style="background-color: #004f63;">
        <div class="row align-items-center">
            <div class="col-6 d-flex align-items-center p-3">
                <a href="../../index.html"><img src="../../assets/img/Logo.png" alt="Logo" height="50" class="me-3"></a>
                <h3 class="mb-0 fw-bold">MedStock</h3>
            </div>
            <div class="col-6 text-end p-3">
                <div class="dropdown">
                    <button class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="fa-regular fa-user me-2"></i> Utilizador
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#"><i class="fa-solid fa-key me-2"></i>Alterar password</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="../../../login/login.html"><i class="fa-solid fa-right-from-bracket me-2"></i>Sair</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <div class="container-fluid">
        <div class="row">
            <aside class="col-md-3 col-lg-2 min-vh-100 p-3 text-white" style="background-color: #212529;">
                <h5 class="fw-bold mt-2 mb-3" style="color: #00b8d9;">Menu</h5>
                <nav>
                    <a href="../../index.html" class="nav-link text-white px-2 mb-1 d-block rounded"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
                    <a href="../equipamentos/lista.html" class="nav-link text-white px-2 mb-1 d-block rounded"><i class="fas fa-stethoscope me-2"></i> Equipamentos</a>
                    <a href="../fornecedores/lista.html" class="nav-link text-white px-2 mb-1 d-block rounded"><i class="fas fa-truck me-2"></i> Fornecedores</a>
                    <a href="../localizacoes/lista.html" class="nav-link text-white px-2 mb-1 d-block rounded"><i class="fas fa-map-marker-alt me-2"></i> Localizações</a>
                    <a href="../documentos/lista.html" class="nav-link text-white px-2 mb-1 d-block rounded"><i class="fas fa-file-medical me-2"></i> Documentos</a>
                    <a href="lista.html" class="nav-link text-white px-2 mb-1 d-block rounded nav-link-active"><i class="fas fa-shield-alt me-2"></i> Garantias</a>
                    <a href="../backoffice/conteudo.html" class="nav-link text-white px-2 mb-1 d-block rounded"><i class="fas fa-globe me-2"></i> Área Pública</a>
                </nav>
            </aside>

            <main class="col-md-9 col-lg-10 p-4" style="background-color: #f2f2f2;">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="mb-0 fw-bold" style="color: #004f63;">
                        <i class="fas fa-pen-to-square me-2"></i> Editar Garantia
                    </h2>
                    <a href="lista.html" class="btn btn-outline-secondary btn-sm">
                        <i class="fas fa-arrow-left me-1"></i> Voltar
                    </a>
                </div>
                <hr>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <form id="formEditar" novalidate>
                            <div class="row g-3">
                                <div class="col-md-12">
                                    <label for="equipamento" class="form-label fw-semibold">Equipamento <span class="text-danger">*</span></label>
                                    <select class="form-select" id="equipamento" required>
                                        <option value="04.002.00" selected>04.002.00 — Monitor multiparamétrico (Philips IntelliVue MP5)</option>
                                        <option value="06.001.00">06.001.00 — Ventilador Dräger Evita V500</option>
                                        <option value="03.005.00">03.005.00 — Bomba de infusão B.Braun</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="dataInicio" class="form-label fw-semibold">Data de Início <span class="text-danger">*</span></label>
                                    <input type="date" class="form-control" id="dataInicio" value="2022-03-15" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="dataFim" class="form-label fw-semibold">Data de Fim <span class="text-danger">*</span></label>
                                    <input type="date" class="form-control" id="dataFim" value="2025-05-28" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="temContrato" class="form-label fw-semibold">Contrato de Manutenção</label>
                                    <select class="form-select" id="temContrato">
                                        <option value="sim" selected>Sim</option>
                                        <option value="nao">Não</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="tipoContrato" class="form-label fw-semibold">Tipo de Contrato</label>
                                    <select class="form-select" id="tipoContrato">
                                        <option value="">— Selecionar —</option>
                                        <option value="anual" selected>Anual</option>
                                        <option value="plurianual">Plurianual</option>
                                        <option value="chamada">Por chamada</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="entidade" class="form-label fw-semibold">Entidade Responsável</label>
                                    <input type="text" class="form-control" id="entidade" value="Philips Healthcare Portugal">
                                </div>
                                <div class="col-md-6">
                                    <label for="numContrato" class="form-label fw-semibold">Nº Contrato</label>
                                    <input type="text" class="form-control" id="numContrato" value="PHC-2022-4521">
                                </div>
                                <div class="col-12">
                                    <label for="observacoes" class="form-label fw-semibold">Observações</label>
                                    <textarea class="form-control" id="observacoes" rows="3">Contrato de manutenção anual com visita preventiva incluída. Renovação prevista para Junho 2025.</textarea>
                                </div>
                                <div class="col-12 d-flex gap-2 mt-2">
                                    <button type="submit" class="btn text-white fw-semibold" style="background-color: #00b8d9;">
                                        <i class="fas fa-floppy-disk me-1"></i> Guardar alterações
                                    </button>
                                    <a href="detalhes.html" class="btn btn-outline-secondary">
                                        <i class="fas fa-xmark me-1"></i> Cancelar
                                    </a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/1231236.js"></script>
    <script>
        document.getElementById('formEditar').addEventListener('submit', function (e) {
            e.preventDefault();
            alert('Garantia atualizada com sucesso.');
            window.location.href = 'detalhes.html';
        });
    </script>
</body>
</html>
